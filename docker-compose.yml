name: comea

services:
  db:
    image: postgres:16-alpine
    container_name: comea-postgres
    environment:
      POSTGRES_USER: comea
      POSTGRES_PASSWORD: comea
      POSTGRES_DB: comea
    ports:
      - "5439:5432"
    volumes:
      - comea_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U comea -d comea"]
      interval: 2s
      timeout: 2s
      retries: 30

volumes:
  comea_pgdata:
